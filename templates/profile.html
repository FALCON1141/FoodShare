{% extends "base.html" %}
{% block content %}

<div class="card p-4">

<h2>My Profile</h2>

<p><b>Name:</b> {{ user.name }}</p>
<p><b>Email:</b> {{ user.email }}</p>
<p><b>Address:</b> {{ user.address }}</p>
<p><b>Role:</b> {{ user.role }}</p>

<br>

<a class="btn btn-warning" href="/edit_profile">Edit Profile</a>
<a class="btn btn-danger" href="/logout">Logout</a>

</div>


{% endblock %}
