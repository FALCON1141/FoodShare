{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow">

<h2>📞 Contact Us</h2>

<p><b>Email:</b> support@foodshare.com</p>
<p><b>Phone:</b> +880-123-456789</p>
<p><b>Address:</b> Dhaka, Bangladesh</p>

<hr>

<h5>Send Message</h5>

<form method="POST">
    <input class="form-control mb-2" name="name" placeholder="Your Name" required>
    <input class="form-control mb-2" name="email" placeholder="Email" required>
    <textarea class="form-control mb-2" name="message" placeholder="Message" required></textarea>
    
    <button class="btn btn-primary">Send</button>
</form>

</form>

{% if message_sent %}
<div class="alert alert-success">
    Message sent successfully!
</div>
{% endif %}

</div>

{% endblock %}
