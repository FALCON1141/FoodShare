{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">📩 Admin Messages</h2>

{% for m in messages %}
<div class="card p-3 mb-3 shadow-sm">

    <!-- USER MESSAGE -->
    <p><strong>Name:</strong> {{ m.name }}</p>
    <p><strong>Email:</strong> {{ m.email }}</p>
    <p><strong>Message:</strong> {{ m.message }}</p>

    <hr>

    <!-- 🔥 SHOW REPLY IF EXISTS -->
    {% if m.reply %}
        <div class="alert alert-success">
            <strong>Admin Reply:</strong><br>
            {{ m.reply }}
        </div>
    {% endif %}

    <!-- 🔥 REPLY BUTTON + FORM -->
    <button class="btn btn-primary btn-sm" onclick="toggleReply({{ m.id }})">
        Reply
    </button>

    <!-- 🔥 HIDDEN REPLY BOX -->
    <form method="POST" action="/reply/{{ m.id }}" id="reply-box-{{ m.id }}" style="display:none; margin-top:10px;">
        <textarea name="reply" class="form-control mb-2" placeholder="Write reply..." required></textarea>
        <button class="btn btn-success btn-sm">Send</button>
    </form>

</div>
{% endfor %}

<!-- 🔥 SIMPLE JS TO TOGGLE REPLY BOX -->
<script>
function toggleReply(id) {
    let box = document.getElementById("reply-box-" + id);
    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>

{% endblock %}
